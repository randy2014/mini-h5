proxy_cache_path /var/cache/nginx/cover levels=1:2 keys_zone=cover-cache:10m max_size=200m inactive=30d;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /index.html {
    add_header Cache-Control "no-store";
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-store";
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://mini-novel-app:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    sub_filter 'https://www.23qb.net/' '/cover/';
    sub_filter_types application/json;
    sub_filter_once off;
  }

  location /cover/ {
    proxy_pass https://www.23qb.net/;
    proxy_set_header Host www.23qb.net;
    proxy_set_header Referer https://www.23qb.net/;
    proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
    proxy_cache cover-cache;
    proxy_cache_valid 200 302 7d;
    proxy_cache_key $uri$is_args$args;
    proxy_ignore_headers Cache-Control Expires Set-Cookie;
    add_header X-Cache-Status $upstream_cache_status;
  }
}
